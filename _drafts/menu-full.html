<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFAF5;--bg-alt:#F5EDE4;--bg-dark:#1A0E09;--text:#1A0E09;--text-light:#6B4C3B;
  --text-on-dark:#F0E6D6;--primary:#7A3B10;--primary-light:#B87A4E;--accent:#C49B5E;
  --accent-light:#E0C9A0;--accent-dim:rgba(196,155,94,0.15);--gold:#A67C2E;
  --font-heading:'Playfair Display',Georgia,serif;--font-body:'DM Sans',sans-serif;
  --radius-sm:8px;--radius-md:16px;--radius-lg:28px;--max-w:1200px;
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
  --ease-spring-out:cubic-bezier(0.22,1,0.36,1);
  --nav-h:64px;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--font-body);color:var(--text);background:var(--bg);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{max-width:100%;height:auto;display:block}
a{color:inherit;text-decoration:none}

/* ===== TOP BAR ===== */
.top-bar{background:var(--bg-dark);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1002}
.top-bar a{display:flex;align-items:center;gap:8px;color:var(--accent);font-size:.82rem;font-weight:500;transition:color .3s}
.top-bar a:hover{color:var(--accent-light)}
.top-bar .back-arrow svg{width:18px;height:18px}

/* ===== HEADER ===== */
.menu-header{background:var(--bg-dark);padding:60px 20px 40px;text-align:center;position:relative;overflow:hidden}
.menu-header::before{content:'';position:absolute;inset:0;opacity:0.03;background:repeating-linear-gradient(45deg,transparent,transparent 24px,rgba(196,155,94,0.4) 24px,rgba(196,155,94,0.4) 25px)}
.menu-header h1{font-family:var(--font-heading);font-size:clamp(2rem,5vw,3.2rem);font-weight:700;color:var(--text-on-dark);position:relative}
.menu-header h1 em{font-style:italic;color:var(--accent);display:block;font-size:.55em;margin-top:8px;letter-spacing:.12em}
.menu-header p{color:rgba(240,230,214,0.6);font-size:.9rem;margin-top:12px;position:relative}

/* ===== STICKY CATEGORY NAV ===== */
.cat-nav{position:sticky;top:0;z-index:1001;background:rgba(26,14,9,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(196,155,94,0.1);overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
.cat-nav::-webkit-scrollbar{display:none}
.cat-nav-inner{display:flex;gap:2px;padding:8px 16px;min-width:max-content}
.cat-nav-btn{flex-shrink:0;padding:8px 18px;border-radius:50px;border:1px solid rgba(196,155,94,0.15);background:transparent;color:rgba(240,230,214,0.6);font-family:var(--font-body);font-size:.75rem;font-weight:500;cursor:pointer;transition:all .3s ease;white-space:nowrap;letter-spacing:.02em}
.cat-nav-btn:hover{border-color:var(--accent);color:var(--text-on-dark);background:rgba(196,155,94,0.08)}
.cat-nav-btn.active{background:var(--accent);border-color:var(--accent);color:var(--bg-dark);font-weight:600}

/* ===== MENU CONTENT ===== */
.menu-content{max-width:var(--max-w);margin:0 auto;padding:40px 20px 80px}

/* Category section */
.cat-section{margin-bottom:48px;scroll-margin-top:90px}
.cat-section:last-child{margin-bottom:0}
.cat-heading{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.cat-heading h2{font-family:var(--font-heading);font-size:1.5rem;font-weight:700;color:var(--primary);letter-spacing:.02em;white-space:nowrap}
.cat-heading .line{flex:1;height:1px;background:linear-gradient(90deg,var(--accent-light),transparent);opacity:0.3}

/* Product grid */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}

/* Product card */
.prod-card{background:var(--bg);border-radius:var(--radius-md);overflow:hidden;border:1px solid rgba(196,155,94,0.08);transition:all .4s var(--ease-spring-out);display:flex;flex-direction:column;cursor:default}
.prod-card:hover{border-color:var(--accent-light);box-shadow:0 8px 32px rgba(26,14,9,0.08);transform:translateY(-4px)}
.prod-card .img-wrap{width:100%;aspect-ratio:16/10;overflow:hidden;background:var(--bg-alt);position:relative;flex-shrink:0}
.prod-card .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease-spring-out)}
.prod-card:hover .img-wrap img{transform:scale(1.08)}
.prod-card .img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:2rem;opacity:0.3;background:var(--bg-alt)}
.prod-card .info{padding:14px 18px 16px;flex:1;display:flex;flex-direction:column;gap:4px}
.prod-card .name{font-weight:600;font-size:.92rem;color:var(--text);line-height:1.3;transition:color .3s}
.prod-card:hover .name{color:var(--primary)}
.prod-card .desc{font-size:.82rem;color:var(--text-light);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prod-card .price-row{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:8px}
.prod-card .price{font-family:var(--font-heading);font-size:1.05rem;font-weight:700;color:var(--accent);letter-spacing:.01em}
.prod-card .price-zero{font-size:.78rem;color:var(--text-light);opacity:0.5;font-style:italic}

/* Responsive */
@media(max-width:640px){
  .prod-grid{grid-template-columns:1fr;gap:12px}
  .cat-heading h2{font-size:1.2rem}
  .cat-section{margin-bottom:36px}
  .cat-nav-btn{padding:6px 14px;font-size:.72rem}
}

/* Scroll reveal */
[data-reveal]{opacity:0;transform:translateY(30px);transition:opacity .7s var(--ease-spring-out),transform .7s var(--ease-spring-out)}
[data-reveal].visible{opacity:1;transform:translateY(0)}

@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>

// ===== RENDER =====
const container = document.getElementById('menuContent');
const navInner = document.getElementById('catNavInner');

function renderMenu(data) {
  let html = '';
  data.forEach((cat, ci) => {
    const catId = 'cat-' + ci;
    html += `<section class="cat-section" id="${catId}" data-reveal>
      <div class="cat-heading">
        <h2>${cat.name}</h2>
        <div class="line"></div>
      </div>
      <div class="prod-grid">`;
    
    cat.products.forEach(p => {
      const imgSrc = p.image_url ? `https://qrapi.kirazsoft.com/${p.image_url}` : '';
      const hasImg = !!p.image_url;
      const hasDesc = !!p.description;
      const showPrice = p.price > 0;
      
      html += `<div class="prod-card">
        <div class="img-wrap">`;
      if (hasImg) {
        html += `<img src="${imgSrc}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=img-placeholder>✦</div>'">`;
      } else {
        html += `<div class="img-placeholder">✦</div>`;
      }
      html += `</div>
        <div class="info">
          <div class="name">${p.name}</div>`;
      if (hasDesc) {
        html += `<div class="desc">${p.description}</div>`;
      }
      html += `<div class="price-row">`;
      if (showPrice) {
        html += `<span class="price">₺${p.price.toFixed(2)}</span>`;
      } else {
        html += `<span class="price-zero">Fiyat bilgisi için sorunuz</span>`;
      }
      html += `</div></div></div>`;
    });
    
    html += `</div></section>`;
  });
  container.innerHTML = html;

  // Category nav buttons
  data.forEach((cat, ci) => {
    const btn = document.createElement('button');
    btn.className = 'cat-nav-btn';
    btn.textContent = cat.name;
    btn.dataset.cat = 'cat-' + ci;
    btn.addEventListener('click', () => {
      document.getElementById('cat-' + ci).scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    navInner.appendChild(btn);
  });
}

renderMenu(MENU_DATA);

// ===== INTERSECTION OBSERVER for scroll reveal =====
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

document.querySelectorAll('[data-reveal]').forEach(el => observer.observe(el));

// ===== ACTIVE CATEGORY NAV HIGHLIGHT =====
const catSections = document.querySelectorAll('.cat-section');
const navBtns = document.querySelectorAll('.cat-nav-btn');

const catObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id;
      navBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.cat === id);
      });
      // Scroll nav button into view
      const activeBtn = document.querySelector(`.cat-nav-btn[data-cat="${id}"]`);
      if (activeBtn) {
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }
  });
}, { threshold: 0.2, rootMargin: '-80px 0px 0px 0px' });

catSections.forEach(s => catObserver.observe(s));

// ===== IMAGE ERROR FIX (re-run for already-loaded images) =====
document.querySelectorAll('.prod-card .img-wrap img').forEach(img => {
  if (img.complete && (img.naturalWidth === 0 || img.naturalHeight === 0)) {
    img.parentElement.innerHTML = '<div class=img-placeholder>✦</div>';
  }
});
</script>
